{% extends 'base.html' %}

{% block auth_content %}
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">◈</div>
      <div class="title">BLANKS STORE</div>
      <div class="sub">ERP SYSTEM</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} mb-3">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="erp-label">Username</label>
        <input type="text" name="username" class="erp-input" required autofocus>
      </div>
      <div class="mb-4">
        <label class="erp-label">Password</label>
        <input type="password" name="password" class="erp-input" required>
      </div>
      <button type="submit" class="erp-btn erp-btn-primary w-100 justify-content-center">
        <i class="bi bi-box-arrow-in-right"></i> LOGIN
      </button>
    </form>

  </div>
</div>
{% endblock %}
