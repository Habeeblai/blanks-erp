{% extends 'base.html' %}
{% block title %}Change Password — Blanks Store ERP{% endblock %}
{% block page_title %}Account Settings{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="erp-card">
      <div class="erp-card-header">
        <span class="erp-card-title">
          <i class="bi bi-shield-lock me-2" style="color:var(--accent)"></i>
          Change Username & Password
        </span>
      </div>

      <form method="POST" action="{{ url_for('auth.change_password') }}">

        <!-- Current password to verify identity -->
        <div class="mb-3">
          <label class="erp-label">Current Password</label>
          <input type="password" name="current_password" class="erp-input"
                 placeholder="Enter your current password" required>
        </div>

        <hr style="border-color:var(--border); margin: 20px 0">

        <!-- New username -->
        <div class="mb-3">
          <label class="erp-label">New Username</label>
          <input type="text" name="new_username" class="erp-input"
                 placeholder="Enter new username"
                 value="{{ current_user.username }}" required>
        </div>

        <!-- New password -->
        <div class="mb-3">
          <label class="erp-label">New Password</label>
          <input type="password" name="new_password" class="erp-input"
                 placeholder="Enter new password (min 6 characters)" required>
        </div>

        <!-- Confirm new password -->
        <div class="mb-4">
          <label class="erp-label">Confirm New Password</label>
          <input type="password" name="confirm_password" class="erp-input"
                 placeholder="Repeat new password" required>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="erp-btn erp-btn-primary">
            <i class="bi bi-check-circle"></i> Save Changes
          </button>
          <a href="{{ url_for('dashboard.index') }}" class="erp-btn erp-btn-outline">
            Cancel
          </a>
        </div>

      </form>

      <div class="mt-4 p-3" style="background:var(--surface-2); border-radius:var(--radius); border:1px solid var(--border)">
        <p style="font-size:12px; color:var(--text-muted); margin:0; font-family:var(--font-mono);">
          <i class="bi bi-info-circle me-2" style="color:var(--info)"></i>
          After saving, you will be logged out and need to log in with your new credentials.
        </p>
      </div>

    </div>
  </div>
</div>
{% endblock %}
